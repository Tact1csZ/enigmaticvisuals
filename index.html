<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigmatic Visuals | Photography & Fine Art</title>
    <style>
        /* ==========================================================================
           DESKTOP & BASE STYLES (Default)
           ========================================================================== */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            text-align: center;
        }
        header {
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.9);
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #d4af37;
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #d4af37;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('Stones.JPG') center/cover;
            padding: 0 20px;
        }
        .hero h2 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .hero p {
            font-size: 1.2rem;
            margin-top: 0;
            letter-spacing: 1px;
        }
        .btn {
            padding: 12px 30px;
            background-color: #d4af37;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 3px;
            margin-top: 20px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: inline-block;
        }
        .btn:hover {
            background-color: #bfa030;
        }
        section {
            padding: 6rem 2rem 4rem 2rem;
        }
        .bg-dark-alternate {
            background-color: #222222;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .gallery-item {
            background-color: #333;
            height: 300px;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        /* Style for placeholder messaging when galleries are empty */
        .coming-soon-box {
            grid-column: 1 / -1;
            padding: 40px;
            border: 1px dashed #444;
            border-radius: 5px;
            color: #888;
            font-style: italic;
        }
        footer {
            background-color: #0d0d0d;
            padding: 2rem;
            font-size: 0.9rem;
            color: #777;
        }
